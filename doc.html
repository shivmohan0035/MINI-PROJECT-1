<!-- when integrate the we have two differnet two origin one is frontend(localhost:5175) and another is backend(localhost:5000), when we try to fetch data from backend API in frontend we will get CORS error in the browser because of security reasons,
 to solve this problem we need to use cors middleware in our backend application. By using cors middleware we can allow our frontend application to access the backend API without any CORS errors. In the frontend we will use axios to make HTTP requests to the backend API and fetch data.
 Axios is a popular JavaScript library that allows us to make HTTP requests from the browser or Node.js. It provides an easy-to-use API for making asynchronous requests and handling responses. By using axios in the frontend and cors in the backend, we can successfully connect our frontend and backend applications and enable communication between them without encountering CORS issues. -->
